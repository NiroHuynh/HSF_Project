<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - CineMax</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Đổi mật khẩu</h2>

        <div class="alert alert-success py-2" th:if="${success}">
            <p th:text="${success}"></p>
        </div>

        <form class="auth-form" th:action="@{/change-password}" method="post" th:object="${changeForm}">
            <div class="form-group">
                <label class="form-label" for="oldPassword">Mật khẩu hiện tại</label>
                <div class="input-wrapper">
                    <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control"
                           placeholder="Nhập mật khẩu hiện tại" required>
                    <i class="bi bi-eye input-icon" onclick="togglePassword('oldPassword', this)"></i>
                </div>
                <small class="text-danger" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></small>
            </div>

            <div class="form-group">
                <label class="form-label" for="newPassword">Mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                           placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)" required>
                    <i class="bi bi-eye input-icon" onclick="togglePassword('newPassword', this)"></i>
                </div>
                <small class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Xác nhận mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                           placeholder="Nhập lại mật khẩu mới" required>
                    <i class="bi bi-eye input-icon" onclick="togglePassword('confirmPassword', this)"></i>
                </div>
                <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Cập nhật mật khẩu</button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword(inputId, iconEl) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        iconEl.classList.toggle('bi-eye');
        iconEl.classList.toggle('bi-eye-slash');
    }
</script>

</body>
</html>
