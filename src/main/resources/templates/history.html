<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Giao Dịch - CineMax</title>

    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css"/>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"/>

    <style>
        :root {
            --color-brand-red:        #E31B23;
            --color-brand-red-light:  rgba(227, 27, 35, 0.15);
            --color-bg:               #0A0A0C;
            --color-surface:          #111114;
            --color-surface-raised:   #18181D;
            --color-text-primary:     #FFFFFF;
            --color-text-secondary:   #A0A0B0;
            --color-text-muted:       #606070;
            --color-border:           rgba(255, 255, 255, 0.08);
            --color-border-strong:    rgba(255, 255, 255, 0.16);
            --shadow-card:            0 4px 24px rgba(0, 0, 0, 0.45);
            --shadow-card-hover:      0 8px 40px rgba(0, 0, 0, 0.65);
            --radius-md:              12px;
            --radius-pill:            9999px;
            --font-family:            'Inter', sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-family);
            margin: 0;
        }

        .booking-page-content {
            padding-block: var(--space-xl);
        }

        .title {
            font-size: var(--text-headline-lg, 28px);
            font-weight: 700;
            margin-bottom: var(--space-lg);
        }

        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .ticket-item {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform var(--transition-base, 250ms ease), background-color var(--transition-base, 250ms ease);
            box-shadow: var(--shadow-card);
        }

        .ticket-item:hover {
            background-color: var(--color-surface-raised);
            border-color: var(--color-border-strong);
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-2px);
        }

        .info-group h3 {
            margin: 0 0 var(--space-xs) 0;
            font-size: var(--text-body-lg, 18px);
            font-weight: 600;
        }

        .info-group p {
            margin: 4px 0;
            color: var(--color-text-secondary);
            font-size: var(--text-body-sm, 14px);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: var(--radius-pill);
            font-size: var(--text-label, 12px);
            font-weight: 600;
            margin-top: var(--space-sm);
            text-transform: uppercase;
        }

        /* Đồng bộ màu trạng thái của hệ thống */
        .status-pending { background-color: rgba(245, 197, 24, 0.15); color: #F5C518; }
        .status-confirmed { background-color: var(--color-brand-red-light); color: var(--color-brand-red); }
        .status-completed { background-color: rgba(45, 122, 79, 0.15); color: #2D7A4F; }
        .status-cancelled { background-color: rgba(255, 255, 255, 0.05); color: var(--color-text-muted); }

        .price-group {
            text-align: right;
        }

        .price-final {
            font-size: 22px;
            font-weight: 800;
            color: var(--color-brand-red);
        }

        .price-discount {
            font-size: var(--text-label, 12px);
            color: var(--color-text-muted);
            text-decoration: line-through;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<!-- Bỏ phần cứng navbar cũ đi, thay bằng dòng này ngay sau thẻ <body> -->
<div th:if="${session.ttdn != null}" th:replace="~{fragments/header :: header}"></div>


<main class="container booking-page-content">
    <h1 class="title">Lịch Sử Giao Dịch</h1>

    <div class="ticket-list">
        <div th:each="b : ${bookings}" class="ticket-item">
            <div class="info-group">
                <h3 th:text="'Mã đặt vé: ' + ${b.bookingCode}">MÃ ĐẶT VÉ</h3>

                <p class="d-flex gap-xs" style="align-items:center;">
                    <span class="material-symbols-outlined" style="font-size:16px;">calendar_month</span>
                    <span th:text="'Ngày đặt: ' + ${#temporals.format(b.bookingDate, 'dd/MM/yyyy HH:mm')}">Ngày đặt</span>
                </p>

                <p th:if="${b.promotion != null}" class="d-flex gap-xs" style="align-items:center; color: #2D7A4F; font-weight: 500;">
                    <span class="material-symbols-outlined" style="font-size:16px;">local_activity</span>
                    <span th:text="'Khuyến mãi: ' + ${b.promotion.name}">Tên Khuyến Mãi</span>
                </p>

                <span class="badge"
                      th:classappend="${b.status == 'PENDING' ? 'status-pending' : (b.status == 'CONFIRMED' ? 'status-confirmed' : (b.status == 'COMPLETED' ? 'status-completed' : 'status-cancelled'))}"
                      th:text="${b.status}">Trạng thái</span>
            </div>

            <div class="price-group">
                <div class="price-final" th:text="${#numbers.formatDecimal(b.finalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
                <div class="price-discount" th:if="${b.discountAmount != null && b.discountAmount.doubleValue() > 0}"
                     th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(bookings)}" style="text-align: center; color: var(--color-text-muted); padding-block: var(--space-2xl);">
            <span class="material-symbols-outlined" style="font-size: 48px; margin-bottom: var(--space-xs);">confirmation_number</span>
            <div class="body-md">Bạn chưa thực hiện giao dịch đặt vé nào tại CineMax.</div>
        </div>
    </div>
</main>

</body>
</html>
