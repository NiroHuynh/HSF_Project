<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tài khoản nội bộ</title><link rel="stylesheet" th:href="@{/css/admin-system.css}"></head><body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div><main class="admin-main">
<div class="toast success" th:if="${success}" th:text="${success}"></div><div class="toast error" th:if="${error}" th:text="${error}"></div>
<header class="page-head"><div><p>QUẢN TRỊ NHÂN SỰ</p><h1>Tài khoản nội bộ</h1><span>Quản lý tài khoản manager và chi nhánh phụ trách.</span></div><button class="primary" onclick="openAccount()">+ Thêm manager</button></header>
<section class="metrics compact"><article><span>TỔNG MANAGER</span><b th:text="${#lists.size(accounts)}">0</b><small>Tài khoản chưa bị xóa</small></article><article><span>ĐANG HOẠT ĐỘNG</span><b class="green" th:text="${#lists.size(accounts.?[status == 'ACTIVE'])}">0</b><small>Có thể đăng nhập</small></article><article><span>CHI NHÁNH</span><b th:text="${#lists.size(cinemas)}">0</b><small>Rạp đang vận hành</small></article></section>
<section class="card table-wrap"><table><thead><tr><th>NHÂN VIÊN</th><th>LIÊN HỆ</th><th>CHI NHÁNH</th><th>TRẠNG THÁI</th><th>NGÀY TẠO</th><th></th></tr></thead><tbody>
<tr th:each="x:${accounts}"><td><strong th:text="${x.fullName}"></strong><small class="block" th:text="${x.email}"></small></td><td th:text="${x.phoneNumber ?: '—'}"></td><td th:text="${x.cinema != null ? x.cinema.name : 'Chưa gán'}"></td><td><span th:class="${x.status=='ACTIVE'?'status on':'status off'}" th:text="${x.status}"></span></td><td th:text="${x.createdAt != null ? #temporals.format(x.createdAt,'dd/MM/yyyy') : '—'}"></td><td><div class="actions"><button type="button" th:attr="data-id=${x.id},data-first=${x.firstName},data-last=${x.lastName},data-email=${x.email},data-phone=${x.phoneNumber},data-status=${x.status},data-cinema=${x.cinema != null ? x.cinema.id : ''}" onclick="editAccount(this)">✎</button><form th:action="@{/admin/accounts/{id}/delete(id=${x.id})}" method="post" onsubmit="return confirm('Xóa tài khoản manager này?')"><button class="danger">×</button></form></div></td></tr>
</tbody></table></section>
<div class="modal" id="accountModal"><section class="modal-box editor-card"><button class="close" type="button" onclick="closeAccount()">×</button><h2>Thêm manager</h2><form method="post" th:action="@{/admin/accounts/save}"><input type="hidden" name="id"><div class="grid2"><label>Họ *<input name="lastName" required></label><label>Tên *<input name="firstName" required></label></div><label>Email *<input type="email" name="email" required></label><div class="grid2"><label>Số điện thoại<input name="phoneNumber"></label><label>Mật khẩu<input type="password" name="password" minlength="6"><small>Để trống khi sửa nếu không đổi.</small></label><label>Chi nhánh *<select name="cinemaId" required><option value="">Chọn rạp</option><option th:each="c:${cinemas}" th:value="${c.id}" th:text="${c.name}"></option></select></label><label>Trạng thái<select name="status"><option value="ACTIVE">ACTIVE</option><option value="INACTIVE">INACTIVE</option></select></label></div><div class="modal-actions"><button type="button" onclick="closeAccount()">Hủy</button><button class="primary">Lưu tài khoản</button></div></form></section></div>
<script>
const accountModal=document.getElementById('accountModal'),accountForm=accountModal.querySelector('form');
function openAccount(){accountForm.reset();accountForm.id.value='';accountModal.querySelector('h2').textContent='Thêm manager';accountModal.classList.add('open')}
function closeAccount(){accountModal.classList.remove('open')}
function editAccount(b){accountForm.id.value=b.dataset.id;accountForm.firstName.value=b.dataset.first;accountForm.lastName.value=b.dataset.last;accountForm.email.value=b.dataset.email;accountForm.phoneNumber.value=b.dataset.phone||'';accountForm.status.value=b.dataset.status;accountForm.cinemaId.value=b.dataset.cinema;accountForm.password.value='';accountModal.querySelector('h2').textContent='Cập nhật manager';accountModal.classList.add('open')}
accountModal.addEventListener('click',e=>{if(e.target===accountModal)closeAccount()});
</script></main></body></html>
