<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="app-header" th:fragment="admin-header(activePage)">
    <div class="header-brand">
        <span class="brand-red">CineMax</span> <span class="brand-white">Admin</span>
    </div>

    <div class="header-right">
        <form th:action="@{/admin/search}" method="get" class="header-search-container">
            <input type="text" name="keyword" class="header-search-input" placeholder="Tìm kiếm..." th:value="${param.keyword}">
            <button type="submit" style="background:none; border:none; padding:0;"><i class="fa-solid fa-magnifying-glass search-icon-right"></i></button>
        </form>
        <div class="header-user-actions">
            <button class="header-icon-btn"><i class="fa-solid fa-bell"></i></button>
            <button class="header-icon-btn"><i class="fa-solid fa-gear"></i></button>
            <div class="header-avatar-wrapper">
                <img th:src="${adminAvatar != null ? adminAvatar : 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100'}" alt="Admin Avatar" class="header-avatar">
            </div>
        </div>
    </div>
</header>
</body>
</html>
