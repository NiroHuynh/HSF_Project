<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="admin-sidebar(activePage)">
    <ul class="sidebar-menu">
        <li>
            <a th:href="@{/admin/movies/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <i class="fa-solid fa-chart-simple"></i> Tổng quan
            </a>
        </li>
        <li>
            <a th:href="@{/admin/movies/dashboard}" class="sidebar-link" th:classappend="${activePage == 'movies'} ? 'active' : ''">
                <i class="fa-solid fa-film"></i> Phim
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'theaters'} ? 'active' : ''">
                <i class="fa-solid fa-ghost"></i> Rạp
            </a>
        </li>
        <li>
            <a th:href="@{/admin/customers/dashboard}" class="sidebar-link" th:classappend="${activePage == 'customers'} ? 'active' : ''">
                <i class="fa-solid fa-users"></i> Khách hàng
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'tickets'} ? 'active' : ''">
                <i class="fa-solid fa-ticket"></i> Vé và giải trí
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'combos'} ? 'active' : ''">
                <i class="fa-solid fa-hamburger"></i> Bắp nước
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout" style="width: 100%; border: none; cursor: pointer;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </form>
    </div>
</aside>
</body>
</html>
