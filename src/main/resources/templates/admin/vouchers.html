<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: head('Quản lý Voucher')}"></head>
<body class="admin-body">

<aside th:replace="~{admin/fragments :: sidebar('vouchers')}"></aside>
<header th:replace="~{admin/fragments :: mobile}"></header>

<main class="admin-content">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-2">
            <div>
                <h1 class="admin-page-title">Quản lý Voucher</h1>
                <p class="admin-page-sub">Tạo, chỉnh sửa và quản lý các mã khuyến mãi của hệ thống.</p>
            </div>
            <a th:href="@{/admin/vouchers/create}" class="btn btn-admin-primary">
                <i class="bi bi-plus-lg"></i> Thêm Voucher
            </a>
        </div>

        <div class="alert alert-success py-2" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

        <div class="admin-panel">
            <!-- Tìm kiếm -->
            <form class="admin-form d-flex gap-2 mb-3" method="get" th:action="@{/admin/vouchers}">
                <input type="text" name="kw" th:value="${kw}" class="form-control" style="max-width: 320px;"
                       placeholder="Tìm theo mã hoặc tên voucher...">
                <button type="submit" class="btn btn-admin-ghost"><i class="bi bi-search"></i> Tìm</button>
                <a th:if="${kw != null and !#strings.isEmpty(kw)}" th:href="@{/admin/vouchers}"
                   class="btn btn-admin-ghost">Xoá lọc</a>
            </form>

            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Mã</th>
                        <th>Tên</th>
                        <th>Giảm giá</th>
                        <th>Hiệu lực</th>
                        <th>Lượt dùng</th>
                        <th>Trạng thái</th>
                        <th style="text-align:right;">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${vouchers.isEmpty()}">
                        <td colspan="8" class="text-center text-secondary py-4">Chưa có voucher nào.</td>
                    </tr>
                    <tr th:each="v : ${vouchers.content}">
                        <td th:text="${v.id}">1</td>
                        <td><strong th:text="${v.code}">SUMMER10</strong></td>
                        <td th:text="${v.name}">Khuyến mãi hè</td>
                        <td class="money"
                            th:text="${v.discountType == 'PERCENT'}
                                     ? ${#numbers.formatDecimal(v.discountValue, 0, 0)} + '%'
                                     : ${#numbers.formatDecimal(v.discountValue, 0, 'COMMA', 0, 'POINT')} + ' đ'">10%</td>
                        <td>
                            <span th:text="${#temporals.format(v.startDate, 'dd/MM/yyyy')}">01/01/2026</span>
                            →
                            <span th:text="${#temporals.format(v.endDate, 'dd/MM/yyyy')}">31/12/2026</span>
                        </td>
                        <td>
                            <span th:text="${v.usedCount ?: 0}">0</span>
                            /
                            <span th:text="${v.usageLimit != null ? v.usageLimit : '∞'}">100</span>
                        </td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="${v.status == 'ACTIVE'} ? 'active' : 'inactive'"
                                  th:text="${v.status == 'ACTIVE'} ? 'Kích hoạt' : 'Đã khoá'">Kích hoạt</span>
                        </td>
                        <td style="text-align:right; white-space:nowrap;">
                            <a th:href="@{/admin/vouchers/{id}/edit(id=${v.id})}"
                               class="btn btn-sm btn-admin-ghost" title="Sửa">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/vouchers/{id}/toggle-status(id=${v.id})}" method="post"
                                  style="display:inline;"
                                  th:attr="data-confirm-title=${v.status == 'ACTIVE'} ? 'Khoá voucher' : 'Kích hoạt voucher',
                                           data-confirm='Voucher &quot;'+${v.code}+'&quot; sẽ '+(${v.status == 'ACTIVE'} ? 'ngừng áp dụng cho các đơn mới.' : 'được áp dụng trở lại.'),
                                           data-confirm-ok=${v.status == 'ACTIVE'} ? 'Khoá' : 'Kích hoạt'">
                                <button type="submit" class="btn btn-sm btn-admin-ghost"
                                        th:title="${v.status == 'ACTIVE'} ? 'Khoá' : 'Kích hoạt'">
                                    <i class="bi" th:classappend="${v.status == 'ACTIVE'} ? 'bi-lock' : 'bi-unlock'"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/vouchers/{id}/delete(id=${v.id})}" method="post"
                                  style="display:inline;"
                                  data-confirm-title="Xoá voucher"
                                  th:attr="data-confirm='Voucher &quot;'+${v.code}+'&quot; sẽ không còn áp dụng được. Bạn có chắc chắn?'"
                                  data-confirm-ok="Xoá voucher">
                                <button type="submit" class="btn btn-sm btn-admin-ghost text-danger" title="Xoá">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Phân trang -->
            <nav th:if="${vouchers.totalPages > 1}" class="mt-3">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${vouchers.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/vouchers(page=${vouchers.number - 1}, kw=${kw})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, vouchers.totalPages - 1)}"
                        th:classappend="${i == vouchers.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/vouchers(page=${i}, kw=${kw})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${vouchers.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/vouchers(page=${vouchers.number + 1}, kw=${kw})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>

    <div th:replace="~{admin/fragments :: confirmModal}"></div>
    <script th:src="@{/js/admin.js}"></script>
</main>

</body>
</html>
