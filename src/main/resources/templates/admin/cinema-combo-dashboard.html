<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link rel="stylesheet" th:href="@{/css/admin-system.css}"></head><body><aside th:replace="~{admin/system-fragments :: sidebar(${active})}"></aside><header th:replace="~{admin/system-fragments :: mobile}"></header><main class="admin-main">
<div class="page-head"><div><p>BÁO CÁO KINH DOANH</p><h1 th:text="${type=='cinema'?'Dashboard Rạp':'Dashboard Combo'}"></h1><span th:text="${type=='cinema'?'Theo dõi doanh thu vé và hiệu suất từng chi nhánh.':'Theo dõi doanh thu và sản lượng combo bán ra.'}"></span></div><form class="date-filter" method="get"><label>Từ ngày<input type="date" name="from" th:value="${from}"></label><span>→</span><label>Đến ngày<input type="date" name="to" th:value="${to}"></label><button class="primary">Lọc dữ liệu</button></form></div>
<div class="quick-range"><button onclick="range(7)">7 ngày</button><button onclick="range(30)" class="active">30 ngày</button><button onclick="range(90)">90 ngày</button><button onclick="range(365)">1 năm</button></div>
<div class="metrics"><article><span>TỔNG DOANH THU</span><b th:text="${#numbers.formatDecimal(totalRevenue,0,'POINT',0,'COMMA')}+' ₫'"></b><small>Trong khoảng đã chọn</small></article><article><span th:text="${type=='cinema'?'VÉ ĐÃ BÁN':'COMBO ĐÃ BÁN'}"></span><b th:text="${#numbers.formatInteger(totalVolume,1,'POINT')}"></b><small>Sản lượng đã thanh toán</small></article><article><span>GIÁ TRỊ TRUNG BÌNH</span><b th:text="${#numbers.formatDecimal(average,0,'POINT',0,'COMMA')}+' ₫'"></b><small th:text="${type=='cinema'?'Trên mỗi vé':'Trên mỗi combo'}"></small></article><article><span th:text="${type=='cinema'?'RẠP CÓ DOANH THU':'COMBO CÓ DOANH THU'}"></span><b th:text="${#lists.size(rankNames)}"></b><small>Có giao dịch trong kỳ</small></article></div>
<div class="dashboard-grid"><section class="card chart-card"><div class="section-head"><div><h2>Xu hướng doanh thu</h2><span>Biến động theo ngày</span></div></div><canvas id="revenueChart" height="260"></canvas></section><section class="card ranking"><div class="section-head"><div><h2 th:text="${type=='cinema'?'Hiệu suất theo rạp':'Combo bán chạy'}"></h2><span>Xếp hạng theo doanh thu</span></div></div><div class="rank-row" th:each="name,st:${rankNames}"><i th:text="${st.count}"></i><div><b th:text="${name}"></b><span th:text="|${rankVolume.get(name)} ${type=='cinema'?'vé':'sản phẩm'}|"></span></div><strong th:text="${#numbers.formatDecimal(rankRevenue.get(name),0,'POINT',0,'COMMA')}+' ₫'"></strong></div><div class="empty" th:if="${#lists.isEmpty(rankNames)}">Chưa có dữ liệu trong khoảng này</div></section></div>
<script th:inline="javascript">const chartLabels=/*[[${chartLabels}]]*/[];const chartValues=/*[[${chartValues}]]*/[];</script><script th:src="@{/js/admin.js}"></script></main></body></html>
