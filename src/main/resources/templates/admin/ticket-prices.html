<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cấu hình giá vé</title><link rel="stylesheet" th:href="@{/css/admin-system.css}"></head><body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div><main class="admin-main"><div class="toast success" th:if="${success}" th:text="${success}"></div>
<header class="page-head"><div><p>CẤU HÌNH GIÁ</p><h1>Giá vé</h1><span>Đồng bộ giá theo loại phòng và loại ghế.</span></div></header>
<form method="post" th:action="@{/admin/ticket-prices}"><div class="price-grid"><article class="price-card" th:each="room:${roomTypes}"><header><div class="room-icon">₫</div><div><h2 th:text="${'Phòng '+room}"></h2><span>Giá áp dụng toàn hệ thống</span></div></header><label th:each="seat:${seatTypes}"><span><b th:text="${seat}"></b><small>Giá một ghế</small></span><span class="money"><input type="number" min="1" th:name="${room+'_'+seat}" th:value="${matrix.get(room+'_'+seat)}"><i>đ</i></span></label></article></div><div class="save-bar"><div><b>Bảng giá toàn hệ thống</b><span>Thay đổi áp dụng cho tất cả phòng cùng loại.</span></div><button class="primary">Lưu bảng giá</button></div></form>
</main></body></html>
