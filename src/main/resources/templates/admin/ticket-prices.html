<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quản lý giá vé</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head><body><aside th:replace="~{admin/fragments :: sidebar(${active})}"></aside><header th:replace="~{admin/fragments :: mobile}"></header><main class="admin-main"><div th:replace="~{admin/fragments :: flash}"></div>
<div class="page-head"><div><p>CHÍNH SÁCH GIÁ</p><h1>Quản lý giá vé</h1><span>Thiết lập 9 mức giá chuẩn theo loại phòng và loại ghế.</span></div></div>
<div class="info-banner"><b>ⓘ Cơ chế đồng bộ</b><span>Khi lưu, mức giá được áp dụng cho tất cả phòng chiếu cùng loại. Phòng tạo mới tự nhận bảng giá này.</span></div>
<form method="post" th:action="@{/admin/ticket-prices}"><div class="price-grid"><article class="price-card" th:each="room:${roomTypes}"><header><div class="room-icon">▣</div><div><h2 th:text="'Phòng '+${room}"></h2><span th:text="${room=='2D'?'Trải nghiệm tiêu chuẩn':room=='3D'?'Không gian ba chiều':'Màn hình cỡ lớn'}"></span></div></header><label th:each="seat:${seatTypes}"><span><b th:text="${seat=='STANDARD'?'Ghế thường':seat=='VIP'?'Ghế VIP':'Ghế đôi'}"></b><small th:text="${seat}"></small></span><div class="money"><input type="number" min="1000" step="1000" required th:name="${room+'_'+seat}" th:value="${matrix.get(room+'_'+seat)}"><i>₫</i></div></label></article></div><div class="save-bar"><div><b>9 mức giá</b><span>Áp dụng đồng bộ cho toàn hệ thống</span></div><button class="primary">✓ Lưu bảng giá</button></div></form>
</main></body></html>
