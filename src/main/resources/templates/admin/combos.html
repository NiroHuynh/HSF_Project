<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quản lý combo</title><link rel="stylesheet" th:href="@{/css/admin-system.css}"></head><body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div><main class="admin-main"><div class="toast success" th:if="${success}" th:text="${success}"></div>
<header class="page-head"><div><p>DỊCH VỤ BẮP NƯỚC</p><h1>Combo</h1><span>Quản lý sản phẩm, tồn kho và trạng thái bán.</span></div><button class="primary" type="button" onclick="document.getElementById('comboModal').classList.add('open')">+ Thêm combo</button></header>
<section class="card table-wrap"><table><thead><tr><th>TÊN COMBO</th><th>GIÁ</th><th>TỒN KHO</th><th>TRẠNG THÁI</th><th></th></tr></thead><tbody><tr th:each="x:${combos}"><td><strong th:text="${x.name}"></strong><small class="block" th:text="${x.description}"></small></td><td class="price" th:text="${#numbers.formatDecimal(x.price,0,'POINT',0,'COMMA')+' đ'}"></td><td th:text="${x.quantity}"></td><td><span th:class="${x.status=='ACTIVE'?'status on':'status off'}" th:text="${x.status}"></span></td><td><form th:action="@{/admin/combos/{id}/delete(id=${x.id})}" method="post"><button class="danger">×</button></form></td></tr></tbody></table></section>
<div class="modal" id="comboModal"><section class="modal-box editor-card"><button type="button" class="close" onclick="this.closest('.modal').classList.remove('open')">×</button><h2>Thêm combo</h2><form method="post" th:action="@{/admin/combos/save}"><label>Tên combo<input name="name" required></label><label>Mô tả<textarea name="description" rows="3"></textarea></label><div class="grid2"><label>Giá bán<input type="number" name="price" min="1" required></label><label>Số lượng<input type="number" name="quantity" min="0" required></label></div><label>Trạng thái<select name="status"><option value="ACTIVE">ACTIVE</option><option value="INACTIVE">INACTIVE</option></select></label><button class="primary">Lưu combo</button></form></section></div>
<script>document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));</script>
</main></body></html>
