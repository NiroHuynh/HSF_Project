<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<!-- ============================================================
     FRAGMENTS dùng chung cho TOÀN BỘ khu ADMIN.
     Đây là nguồn duy nhất cho khung trang: trước đây khung bị tách đôi
     (fragments.html cho Tổng quan/Doanh thu/Voucher và system-fragments.html
     cho Địa điểm/Giá vé/Combo/Dashboard) nên mỗi nhóm trang một giao diện.

       - head(title)     : CSS chung
       - sidebar(active) : thanh điều hướng bên trái
       - mobile          : header khi màn hình nhỏ
       - flash           : toast thông báo success/error
       - confirmModal    : modal xác nhận dùng chung (thay confirm() của trình duyệt)
     ============================================================ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - CineMax Admin'">CineMax Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- admin-system.css giữ KHUNG (sidebar, layout, bảng, modal); admin-panel.css giữ COMPONENT -->
    <link rel="stylesheet" th:href="@{/css/admin-system.css}">
    <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
</head>
<body>

<aside class="admin-sidebar" th:fragment="sidebar(active)">
    <a class="admin-brand" th:href="@{/admin}"><span>CM</span><div>CineMax<small>Quản trị hệ thống</small></div></a>
    <nav>
        <p>TỔNG QUAN</p>
        <a th:href="@{/admin}" th:classappend="${active == 'overview'} ? 'active'"><b class="bi bi-grid-1x2"></b> Tổng quan</a>
        <a th:href="@{/admin/revenue}" th:classappend="${active == 'revenue'} ? 'active'"><b class="bi bi-bar-chart-line"></b> Báo cáo doanh thu</a>
        <a th:href="@{/admin/dashboard/cinema}" th:classappend="${active == 'dashboard-cinema'} ? 'active'"><b class="bi bi-building"></b> Dashboard rạp</a>
        <a th:href="@{/admin/dashboard/combo}" th:classappend="${active == 'dashboard-combo'} ? 'active'"><b class="bi bi-pie-chart"></b> Dashboard combo</a>

        <p>QUẢN LÝ</p>
        <a th:href="@{/admin/vouchers}" th:classappend="${active == 'vouchers'} ? 'active'"><b class="bi bi-ticket-perforated"></b> Voucher</a>
        <a th:href="@{/admin/locations}" th:classappend="${active == 'locations'} ? 'active'"><b class="bi bi-geo-alt"></b> Địa điểm &amp; phòng</a>
        <a th:href="@{/admin/ticket-prices}" th:classappend="${active == 'prices'} ? 'active'"><b class="bi bi-cash-coin"></b> Giá vé</a>
        <a th:href="@{/admin/combos}" th:classappend="${active == 'combos'} ? 'active'"><b class="bi bi-cup-straw"></b> Combo</a>

        <p>TÀI KHOẢN</p>
        <a th:href="@{/home}"><b class="bi bi-house"></b> Về trang chủ</a>
        <a th:href="@{/change-password}"><b class="bi bi-key"></b> Đổi mật khẩu</a>
    </nav>
    <div class="admin-user">
        <div class="avatar" th:text="${#strings.substring(session.ttdn.fullName, 0, 1)}">A</div>
        <div><strong th:text="${session.ttdn.fullName}">Admin</strong><small>Administrator</small></div>
        <a th:href="@{/logout}" title="Đăng xuất">↪</a>
    </div>
</aside>

<header class="mobile-head" th:fragment="mobile">
    <button onclick="document.body.classList.toggle('menu-open')">☰</button><b>CineMax Admin</b>
</header>

<div th:fragment="flash">
    <div class="toast success" th:if="${success}" th:text="${success}"></div>
    <div class="toast error" th:if="${error}" th:text="${error}"></div>
</div>

<!-- Mọi form gắn data-confirm="..." sẽ mở modal này thay vì confirm() của trình duyệt -->
<div class="modal confirm-modal" id="confirmModal" th:fragment="confirmModal">
    <div class="modal-box">
        <button type="button" class="close" onclick="closeModal(this)">×</button>
        <h2 id="confirmTitle">Xác nhận</h2>
        <p class="confirm-message" id="confirmMessage">Bạn có chắc chắn không?</p>
        <div class="modal-actions">
            <button type="button" onclick="closeModal(this)">Hủy</button>
            <button type="button" class="primary" id="confirmOk">Xác nhận</button>
        </div>
    </div>
</div>

</body>
</html>
