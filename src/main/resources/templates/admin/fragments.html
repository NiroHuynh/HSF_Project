<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<!-- ============================================================
     FRAGMENTS dùng chung cho khu ADMIN:
       - head(title): CSS chung (bootstrap + style.css + admin.css + icons)
       - sidebar(activePage): thanh điều hướng bên trái
     ============================================================ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - CineMax Admin'">CineMax Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<aside class="admin-sidebar" th:fragment="sidebar(activePage)">
    <div class="admin-logo"><span class="brand">CineMax</span> Admin</div>
    <div class="admin-logo-sub">Hệ thống quản trị</div>

    <a th:href="@{/admin}" class="admin-nav-link"
       th:classappend="${activePage == 'overview'} ? 'active'">
        <i class="bi bi-grid-1x2"></i> Tổng quan
    </a>
    <a th:href="@{/admin/revenue}" class="admin-nav-link"
       th:classappend="${activePage == 'revenue'} ? 'active'">
        <i class="bi bi-bar-chart-line"></i> Báo cáo Doanh thu
    </a>
    <a th:href="@{/admin/vouchers}" class="admin-nav-link"
       th:classappend="${activePage == 'vouchers'} ? 'active'">
        <i class="bi bi-ticket-perforated"></i> Quản lý Voucher
    </a>

    <div class="admin-nav-sep">
        <a th:href="@{/home}" class="admin-nav-link">
            <i class="bi bi-house"></i> Về trang chủ
        </a>
        <a th:href="@{/change-password}" class="admin-nav-link">
            <i class="bi bi-key"></i> Đổi mật khẩu
        </a>
        <a th:href="@{/logout}" class="admin-nav-link">
            <i class="bi bi-box-arrow-right"></i> Đăng xuất
        </a>
    </div>
</aside>

</body>
</html>
