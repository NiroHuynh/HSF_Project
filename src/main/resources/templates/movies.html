<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phim - CineMax</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .movies-page .filter-text-tab {
            font-family: 'Montserrat', sans-serif;
            line-height: 1;
            text-decoration: none;
            transition: color var(--transition-fast), font-size var(--transition-fast);
            display: inline-block;
        }
        .movies-page .filter-text-tab.active {
            color: #fff;
            font-size: 60px;
            font-weight: 400;
            cursor: default;
        }
        .movies-page .filter-text-tab:not(.active) {
            color: rgba(153, 153, 153, 0.40);
            font-size: 36px;
            font-weight: 400;
        }
        .movies-page .filter-text-tab:not(.active):hover {
            color: rgba(153, 153, 153, 0.70);
        }

        .movies-page .search-bar-custom {
            background: #1A1A2A;
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid #2A2A3A;
            padding: 24px 24px 23px 56px;
            position: relative;
        }
        .movies-page .search-bar-custom input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            color: rgba(153, 153, 153, 0.50);
            font-size: 18px;
            font-family: 'Liberation Sans', sans-serif;
        }
        .movies-page .search-bar-custom input::placeholder {
            color: rgba(153, 153, 153, 0.50);
        }
        .movies-page .search-bar-custom .search-icon {
            position: absolute;
            left: 20px;
            top: 23px;
            width: 18px;
            height: 18px;
        }
        .movies-page .search-bar-custom .search-icon svg {
            width: 18px;
            height: 18px;
            fill: #999;
        }

        /* --- CẤU TRÚC LẠI CARD PHIM ĐỂ THÔNG TIN ĐÈ LÊN BANNER --- */
        .movies-page .movie-card--list {
            background: #1A1A2A;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition-base), box-shadow var(--transition-base);
            outline: 1px solid rgba(255, 255, 255, 0.05);
            outline-offset: -1px;
        }
        .movies-page .movie-card--list:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card-hover);
        }
        .movies-page .movie-card--list .movie-card__poster-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            height: 420px; /* Điều chỉnh chiều cao hiển thị của toàn bộ banner phim */
        }
        .movies-page .movie-card--list .movie-card__poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Hiệu ứng phủ khi hover (nút đặt vé) */
        .movies-page .movie-card--list .movie-card__overlay-btn {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.40);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-base);
            text-decoration: none;
            z-index: 3; /* Nằm trên cùng khi kích hoạt */
        }
        .movies-page .movie-card--list:hover .movie-card__overlay-btn {
            opacity: 1;
        }

        /* Định vị đánh giá góc trên phải */
        .movies-page .movie-card--list .movie-card__rating {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.60);
            backdrop-filter: blur(6px);
            border-radius: 4px;
            padding: 4px 8px;
            color: #FACC15;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Be Vietnam Pro', sans-serif;
            z-index: 2;
        }

        /* Định vị ngày chiếu góc trên trái */
        .movies-page .movie-card--list .movie-card__date-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--color-brand-red);
            color: white;
            font-size: var(--text-label);
            font-weight: 700;
            padding: 3px 8px;
            border-radius: var(--radius-xs);
            line-height: 1.5;
            z-index: 2;
        }

        /* Đẩy phần thông tin phim xuống đáy và tạo dải màu mờ tránh chìm chữ */
        .movies-page .movie-card--list .movie-card__info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 2;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 60%, rgba(0, 0, 0, 0) 100%);
            box-sizing: border-box;
        }
        .movies-page .movie-card--list .movie-card__tags {
            display: flex;
            gap: 8px;
        }
        .movies-page .movie-card--list .movie-card__title {
            font-size: 20px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            line-height: 28px;
            color: #fff;
            padding-top: 4px;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .movies-page .movie-card--list .movie-card__genre {
            font-size: 14px;
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 400;
            line-height: 20px;
            color: #E9BCB6;
            margin: 0;
        }

        .movies-page .section-title-lg {
            margin-bottom: 0;
        }
        /* --- CSS NÚT HÌNH PHỄU --- */
        .movies-page .btn-toggle-filter {
            background: #1A1A2A;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .movies-page .btn-toggle-filter:hover,
        .movies-page .btn-toggle-filter.active {
            background: #242438;
            border-color: var(--color-brand-red, #E50914);
            color: var(--color-brand-red, #E50914);
        }

        /* --- KHOANG CHỨA BỘ LỌC CÓ HIỆU ỨNG ĐÓNG MỞ --- */
        .movies-page .filter-container {
            background: #1A1A2A;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);

            /* Thiết lập hiệu ứng ẩn/hiện trượt mượt mà */
            max-height: 0;
            overflow: hidden;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            margin-bottom: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Khi khoang chứa bộ lọc có class .show (JavaScript kích hoạt) */
        .movies-page .filter-container.show {
            max-height: 500px; /* Chiều cao tối đa khi mở ra */
            padding-top: 20px;
            padding-bottom: 20px;
            margin-bottom: 24px;
            opacity: 1;
        }

        /* --- GIỮ NGUYÊN CSS CHIP CHOOSE ĐÃ LÀM Ở BƯỚC TRƯỚC --- */
        .movies-page .filter-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 12px;
        }
        .movies-page .filter-row-custom {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .movies-page .filter-checkbox {
            display: none;
        }
        .movies-page .filter-chip-label {
            display: inline-block;
            padding: 8px 18px;
            background: #242438;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }
        .movies-page .filter-chip-label:hover {
            background: #2E2E4A;
            color: #fff;
        }
        .movies-page .filter-checkbox:checked + .filter-chip-label {
            background: var(--color-brand-red, #E50914);
            color: #fff;
            font-weight: 600;
        }
        .movies-page .btn-apply-filter {
            margin-top: 20px;
            background: transparent;
            color: var(--color-brand-red, #E50914);
            border: 1.5px solid var(--color-brand-red, #E50914);
            padding: 8px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .movies-page .btn-apply-filter:hover {
            background: var(--color-brand-red, #E50914);
            color: #fff;
        }
        .movies-page .pagination-info {
            color: var(--color-text-secondary);
            font-size: var(--text-body-sm);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="section movies-page">
    <div class="container">
        <div class="section-title-lg" style="display: flex; align-items: baseline; gap: 24px; margin-bottom: 32px;">
            <a class="filter-text-tab"
               th:classappend="${currentStatus.name() == 'NOW_SHOWING'} ? 'active' : ''"
               th:href="@{/phim(status='NOW_SHOWING', search=${search})}">Phim Đang Chiếu</a>
            <a class="filter-text-tab"
               th:classappend="${currentStatus.name() == 'COMING_SOON'} ? 'active' : ''"
               th:href="@{/phim(status='COMING_SOON', search=${search})}">Phim Sắp Chiếu</a>
            <a class="filter-text-tab"
               th:classappend="${currentStatus.name() == 'ENDED'} ? 'active' : ''"
               th:href="@{/phim(status='ENDED', search=${search})}">Đã Chiếu</a>
        </div>

        <form th:action="@{/phim}" method="GET" style="margin-bottom: 24px;">
            <input type="hidden" name="status" th:value="${currentStatus.name()}">
            <div class="search-bar-custom">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </span>
                <input type="text" name="search" th:value="${search}"
                       placeholder="Tìm kiếm phim, đạo diễn, diễn viên...">
            </div>
        </form>

        <div style="margin-bottom: 20px;">
            <button type="button" id="toggleFilterBtn" class="btn-toggle-filter">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>
                <span>Bộ lọc phim</span>
            </button>
        </div>

        <div class="filter-container" id="filterDrawer">
            <div class="filter-label">Chọn thể loại (Có thể chọn nhiều):</div>

            <form th:action="@{/phim}" method="GET" id="filterForm">
                <input type="hidden" name="status" th:value="${currentStatus.name()}">
                <input type="hidden" name="search" th:if="${search != null}" th:value="${search}">
                <input type="hidden" name="sort" th:if="${sort != null}" th:value="${sort}">
                <input type="hidden" name="direction" th:if="${direction != null}" th:value="${direction}">

                <div class="filter-row-custom">
                    <input type="checkbox" id="genre-all" class="filter-checkbox"
                           th:checked="${selectedGenreIds == null or #lists.isEmpty(selectedGenreIds)}">
                    <label for="genre-all" class="filter-chip-label">Tất cả</label>

                    <th:block th:each="g : ${allGenres}">
                        <input type="checkbox"
                               name="genreIds"
                               th:id="'genre-' + ${g.id}"
                               th:value="${g.id}"
                               class="filter-checkbox genre-item-checkbox"
                               th:checked="${selectedGenreIds != null and #lists.contains(selectedGenreIds, g.id)}">
                        <label th:for="'genre-' + ${g.id}" class="filter-chip-label" th:text="${g.name}">Thể loại</label>
                    </th:block>
                </div>

                <button type="submit" class="btn-apply-filter">Áp dụng bộ lọc</button>
            </form>
        </div>

        <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 24px;">
            <span style="color: var(--color-text-secondary);">Sắp xếp:</span>
            <a th:href="@{/phim(status=${currentStatus.name()}, genreIds=${genreIdsParam}, sort='title', direction='asc', search=${search})}"
               th:classappend="${sort == 'title'} ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm'">Tên A-Z</a>
            <a th:href="@{/phim(status=${currentStatus.name()}, genreIds=${genreIdsParam}, sort='releaseDate', direction='desc', search=${search})}"
               th:classappend="${sort == 'releaseDate'} ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm'">Ngày chiếu</a>
            <a th:href="@{/phim(status=${currentStatus.name()}, genreIds=${genreIdsParam}, sort='averageRating', direction='desc', search=${search})}"
               th:classappend="${sort == 'averageRating'} ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm'">Đánh giá</a>
        </div>

        <div th:if="${moviePage.totalElements == 0}" style="text-align: center; padding: 60px 0;">
            <p style="font-size: 18px; color: var(--color-text-secondary);">
                <span th:if="${search != null and !search.isEmpty()}">Không tìm thấy kết quả cho "<span th:text="${search}"></span>"</span>
                <span th:if="${search == null or search.isEmpty()}">Chưa có phim nào</span>
            </p>
        </div>

        <div class="movie-grid" th:if="${moviePage.totalElements > 0}">
            <div class="movie-card--list" th:each="dto : ${moviePage.content}">

                <div class="movie-card__poster-wrapper">
                    <a th:href="@{/phim/{id}(id=${dto.movie.id})}">
                        <img class="movie-card__poster" th:src="${dto.movie.posterUrl}" th:alt="${dto.movie.title}">
                    </a>

                    <div class="movie-card__rating" th:if="${dto.movie.averageRating != null}">
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="#FACC15" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 0L7.35 4.05H11.7L8.175 6.6L9.525 10.65L6 8.1L2.475 10.65L3.825 6.6L0.3 4.05H4.65L6 0Z"/>
                        </svg>
                        <span th:text="${dto.movie.averageRating}">8.9</span>
                    </div>

                    <div class="movie-card__date-badge"
                         th:if="${currentStatus.name() == 'COMING_SOON'}"
                         th:text="${#temporals.format(dto.movie.releaseDate, 'dd.MM.yyyy')}">22.03.2026</div>

                    <a th:href="@{/phim/{id}(id=${dto.movie.id})}" class="movie-card__overlay-btn">
                        <span class="btn btn-primary" style="padding: 12px 24px; font-size: 16px;">Đặt Vé</span>
                    </a>

                    <div class="movie-card__info">
                        <div class="movie-card__tags">
                            <span class="chip chip-imax">IMAX</span>
                            <span class="chip"
                                  th:classappend="${'chip-' + #strings.toLowerCase(dto.movie.ageRating)}"
                                  th:text="${dto.movie.ageRating}">T16</span>
                        </div>
                        <h3 class="movie-card__title" th:text="${dto.movie.title}">Tên phim</h3>
                        <p class="movie-card__genre" th:text="${dto.genresString}">Hành động, Viễn tưởng</p>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${moviePage.totalPages > 1}" style="display: flex; justify-content: center; gap: 8px; margin-top: 40px;">
            <a th:if="${moviePage.hasPrevious()}"
               th:href="@{/phim(status=${currentStatus.name()}, genreIds=${genreIdsParam}, page=${moviePage.number - 1}, size=${moviePage.size}, sort=${sort}, direction=${direction}, search=${search})}"
               class="btn btn-outline btn-sm">&#9664; Trước</a>

            <span th:each="i : ${#numbers.sequence(0, moviePage.totalPages - 1)}">
                <a th:if="${i == moviePage.number}"
                   class="btn btn-primary btn-sm" th:text="${i + 1}">1</a>
                <a th:if="${i != moviePage.number}"
                   th:href="@{/phim(status=${currentStatus.name()}, genreIds=${genreIdsParam}, page=${i}, size=${moviePage.size}, sort=${sort}, direction=${direction}, search=${search})}"
                   class="btn btn-outline btn-sm" th:text="${i + 1}">1</a>
            </span>

            <a th:if="${moviePage.hasNext()}"
               th:href="@{/phim(status=${currentStatus.name()}, genreIds=${genreIdsParam}, page=${moviePage.number + 1}, size=${moviePage.size}, sort=${sort}, direction=${direction}, search=${search})}"
               class="btn btn-outline btn-sm">Sau &#9654;</a>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggleFilterBtn');
        const filterDrawer = document.getElementById('filterDrawer');
        const checkAll = document.getElementById('genre-all');
        const genreChecks = document.querySelectorAll('.genre-item-checkbox');
        const filterForm = document.getElementById('filterForm');

        // 1. Logic ẩn/hiện khi click vào nút Hình phễu
        toggleBtn.addEventListener('click', function() {
            filterDrawer.classList.toggle('show');
            this.classList.toggle('active');
        });

        // Tự động MỞ SẴN bộ lọc nếu người dùng đang thực hiện lọc (để họ thấy trạng thái đang chọn)
        if (checkAll && !checkAll.checked) {
            filterDrawer.classList.add('show');
            toggleBtn.classList.add('active');
        }

        // 2. Logic phối hợp giữa nút "Tất cả" và các thể loại khác (Giống bước trước)
        checkAll.addEventListener('change', function() {
            if (this.checked) genreChecks.forEach(cb => cb.checked = false);
        });

        genreChecks.forEach(cb => {
            cb.addEventListener('change', function() {
                if (this.checked) {
                    checkAll.checked = false;
                } else {
                    const anyChecked = Array.from(genreChecks).some(c => c.checked);
                    if (!anyChecked) checkAll.checked = true;
                }
            });
        });

        // 3. Tối ưu hóa URL sạch trước khi Submit
        filterForm.addEventListener('submit', function() {
            if (checkAll.checked) {
                genreChecks.forEach(cb => cb.disabled = true);
            }
        });
    });
</script>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:replace="~{fragments/header :: header-script}"></script>
</body>
</html>
