<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<!-- ============================================================
     FRAGMENT: HEADER / NAVBAR
     Cách dùng ở trang khác:
     <div th:replace="~{fragments/header :: header}"></div>

     Biến truyền vào (optional, set ở Controller qua model.addAttribute):
     - activePage (String): "phim" | "rap" | "uu-dai" | "ve-cua-toi"  -> để tô active đúng menu
     - currentUser (Object): null nếu chưa đăng nhập, có object User nếu đã đăng nhập
       (currentUser cần có getter: getFullName(), getAvatarInitial() hoặc tương tự)
     ============================================================ -->
<nav class="navbar" th:fragment="header">
  <div class="container">

    <!-- Logo -->
    <a th:href="@{/home}" class="navbar-brand">CineMax</a>

    <!-- Menu chính: Đã sửa lỗi vỡ dọc bằng d-flex flex-row -->
    <ul class="navbar-nav d-flex flex-row">
      <li>
        <a th:href="@{/phim}" class="nav-link"
           th:classappend="${activePage == 'phim'} ? ' active' : ''">Phim</a>
      </li>
      <li>
        <a th:href="@{/rap}" class="nav-link"
           th:classappend="${activePage == 'rap'} ? ' active' : ''">Rạp</a>
      </li>
      <li>
        <a th:href="@{/customer/vouchers}" class="nav-link"
           th:classappend="${activePage == 'uu-dai'} ? ' active' : ''">Ưu đãi</a>
      </li>
      <li>
        <a th:href="@{/customer/history}" class="nav-link"
           th:classappend="${activePage == 've-cua-toi'} ? ' active' : ''">Vé của tôi</a>
      </li>
    </ul>

    <!-- Nút toggle menu mobile -->
    <button class="navbar-toggler" type="button" aria-label="Mở menu" onclick="toggleNavbar()">
      <span></span><span></span><span></span>
    </button>

    <!-- Khu vực bên phải -->
    <div class="navbar-actions">

<!--       TH1: Đã đăng nhập -> hiện avatar + tên + dropdown -->
      <div class="user-chip-wrapper" th:if="${session.ttdn != null}" style="position: relative;">
        <div class="user-chip" onclick="toggleUserMenu()" style="cursor: pointer;">
          <div class="user-avatar" th:text="${#strings.substring(#strings.trim(session.ttdn.fullName), 0, 1)}">A</div>
          <div class="user-info">
            <div class="user-name" th:text="${session.ttdn.fullName}">Nguyễn Văn A</div>
            <div class="user-role" th:text="${session.ttdn.role.roleName}"></div>
          </div>
        </div>
        <div class="user-dropdown" id="userDropdown" style="display:none; position:absolute; top:100%; right:0; background:#fff; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); min-width:160px; z-index:1000; margin-top:6px; overflow:hidden;">
          <a th:href="@{/logout}" style="display:block; padding:12px 20px; color:#e74c3c; text-decoration:none; font-size:14px; font-weight:500; transition: background .2s;" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='transparent'">
            Đăng xuất
          </a>
        </div>
      </div>

      <!-- TH2: Chưa đăng nhập -> hiện nút Đăng nhập/Đăng ký -->
      <a th:if="${session.ttdn == null}" th:href="@{/login}" class="btn btn-primary btn-sm">
        Đăng nhập / Đăng ký
      </a>
    </div>
  </div>
</nav>

<!-- Script điều khiển menu mobile - chỉ cần load 1 lần, đặt cùng fragment header -->
<script th:fragment="header-script">
  function toggleNavbar() {
    document.querySelector('.navbar-nav').classList.toggle('is-open');
  }
  function toggleUserMenu() {
    var dd = document.getElementById('userDropdown');
    dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
  }
  document.addEventListener('click', function(e) {
    var wrapper = document.querySelector('.user-chip-wrapper');
    var dd = document.getElementById('userDropdown');
    if (wrapper && dd && !wrapper.contains(e.target)) {
      dd.style.display = 'none';
    }
  });
</script>

</body>
</html>
