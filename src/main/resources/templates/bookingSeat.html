<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${showtime.movie.title} + ' - Chọn ghế - CineMax'">Chọn ghế - CineMax</title>

    <!-- Design system gốc của dự án (giữ nguyên, không định nghĩa lại token) -->
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css"/>

    <!-- Icon font Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"/>

    <!-- ============================================================
         CSS riêng cho trang Chọn ghế — chỉ thêm component mới,
         không định nghĩa lại token đã có trong style.css.
         ============================================================ -->
    <style>
        .text-right { text-align: right; }

        .booking-page-content {
            padding-bottom: 140px; /* chừa chỗ cho action bar sticky */
        }

        /* Màn hình chiếu */
        .screen-indicator {
            height: 4px;
            margin: 0 auto var(--space-sm);
            max-width: 700px;
            background: linear-gradient(to right, transparent, var(--color-brand-red), transparent);
            border-radius: var(--radius-pill);
            box-shadow: 0 0 24px var(--color-brand-red);
        }
        .screen-label {
            text-align: center;
            letter-spacing: 0.2em;
        }

        /* Sơ đồ ghế */
        .seat-map {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-sm);
            margin-block: var(--space-xl);
        }
        .seat-row {
            display: flex;
            gap: 6px;
        }

        .seat {
            width: 38px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            border-radius: var(--radius-xs);
            border: 1.5px solid transparent;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }
        .seat:not(:disabled):hover {
            transform: translateY(-2px);
        }

        .seat--standard {
            background: var(--color-surface-raised);
            border-color: var(--color-border-strong);
            color: var(--color-text-secondary);
        }
        .seat--vip {
            background: var(--color-brand-red-light);
            border-color: var(--color-brand-red);
            color: var(--color-brand-red);
        }
        .seat--sweetbox {
            background: #2E1E3A;
            border-color: #B06DF0;
            color: #B06DF0;
        }
        .seat--booked {
            background: var(--color-surface);
            border-color: var(--color-border);
            color: var(--color-text-muted);
            opacity: 0.55;
            cursor: not-allowed;
        }
        .seat--selected {
            background: var(--color-brand-red) !important;
            border-color: var(--color-brand-red) !important;
            color: #fff !important;
            box-shadow: 0 0 0 2px rgba(227, 27, 35, 0.35);
        }

        /* Chú giải */
        .seat-legend {
            display: flex;
            justify-content: center;
            gap: var(--space-lg);
            flex-wrap: wrap;
            padding-top: var(--space-md);
            border-top: 1px solid var(--color-border);
        }
        .seat-legend__item {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: var(--text-body-sm);
            color: var(--color-text-secondary);
        }
        .seat-swatch {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            border-radius: var(--radius-xs);
        }

        /* ----------------------------------------------------------
           ACTION BAR — bị thiếu ở bản trước, đây là nguyên nhân thanh
           dưới hiển thị xếp dọc/lệch layout. Bổ sung lại đầy đủ.
           ---------------------------------------------------------- */
        .booking-actionbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-lg);
            padding: var(--space-md) var(--space-lg);
            background: var(--color-surface-overlay);
            backdrop-filter: blur(8px);
            border-top: 1px solid var(--color-border);
            box-shadow: var(--shadow-nav);
        }
        .booking-actionbar__summary {
            display: flex;
            gap: var(--space-2xl);
            flex: 1;
        }
        .booking-actionbar__total {
            text-align: right;
        }
        @media (max-width: 768px) {
            .booking-actionbar {
                flex-wrap: wrap;
            }
            .booking-actionbar__summary {
                order: 3;
                width: 100%;
                gap: var(--space-lg);
            }
        }
    </style>
</head>
<body>

<!-- ============================================================
     NAVBAR — TODO: thay bằng th:replace="~{fragments/navbar :: navbar}"
     ============================================================ -->
<nav class="navbar">
    <div class="container">
        <a th:href="@{/}" class="navbar-brand">CineMax</a>

        <ul class="navbar-nav">
            <li><a th:href="@{/phim}" class="nav-link">Phim</a></li>
            <li><a th:href="@{/rap}" class="nav-link">Rạp</a></li>
            <li><a th:href="@{/uu-bai}" class="nav-link">Ưu bãi</a></li>
            <li><a th:href="@{/ve-cua-toi}" class="nav-link">Vé của tôi</a></li>
        </ul>

        <div class="navbar-actions">
            <button class="icon-btn" type="button" aria-label="Thông báo">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="user-chip">
                <div class="user-avatar">HP</div>
                <div class="user-info">
                    <div class="user-name">Huỳnh Tấn Phong</div>
                    <div class="user-role">Khách hàng</div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="container booking-page-content">

    <!-- ============================================================
         THÔNG TIN SUẤT CHIẾU
         ============================================================ -->
    <div class="flex-between flex-wrap gap-md mt-xl mb-lg">
        <div>
            <div class="d-flex gap-sm" style="align-items:center;">
                <span class="chip chip-t16" th:text="${showtime.movie.ageRating}">T16</span>
                <h1 class="headline-md" th:text="${showtime.movie.title}">Tên phim</h1>
            </div>

            <div class="d-flex gap-lg flex-wrap mt-sm body-sm text-secondary">
                <span class="d-flex gap-xs" style="align-items:center;">
                    <span class="material-symbols-outlined" style="font-size:16px;">location_on</span>
                    <span th:text="${showtime.room.cinema.name}">Tên rạp</span>
                </span>
                <span class="d-flex gap-xs" style="align-items:center;">
                    <span class="material-symbols-outlined" style="font-size:16px;">theaters</span>
                    <span th:text="${showtime.room.name}">Phòng chiếu</span>
                </span>
                <span class="d-flex gap-xs" style="align-items:center;">
                    <span class="material-symbols-outlined" style="font-size:16px;">calendar_month</span>
                    <span th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')} + ' ~ '
                                        + ${#temporals.format(showtime.endTime, 'dd/MM/yyyy HH:mm')}">Giờ chiếu</span>
                </span>
            </div>
        </div>

        <div class="text-right">
            <div class="label-sm text-muted">SỨC CHỨA</div>
            <div class="text-accent" style="font-size:22px; font-weight:800;"
                 th:text="${availableSeats} + ' / ' + ${totalSeats} + ' Ghế'">69 / 82 Ghế</div>
        </div>
    </div>

    <!-- ============================================================
         MÀN HÌNH CHIẾU
         ============================================================ -->
    <div class="screen-indicator"></div>
    <div class="screen-label label-sm text-muted">SCREEN</div>

    <!-- ============================================================
         SƠ ĐỒ GHẾ
         ============================================================ -->
    <div class="seat-map" id="seatMap">
        <div class="seat-row" th:each="row : ${rows}">
            <button type="button"
                    class="seat"
                    th:each="seat : ${row.seats}"
                    th:classappend="${seat.cssClass()}"
                    th:text="${seat.booked ? '✕' : seat.code}"
                    th:attr="data-seat-code=${seat.code}, data-seat-type=${seat.type}"
                    th:disabled="${seat.booked}"
                    th:aria-label="${'Ghế ' + seat.code}">
                A1
            </button>
        </div>
    </div>

    <!-- Chú giải -->
    <div class="seat-legend mb-xl">
        <div class="seat-legend__item"><span class="seat-swatch seat--standard"></span> Thường</div>
        <div class="seat-legend__item"><span class="seat-swatch seat--vip"></span> VIP</div>
        <div class="seat-legend__item"><span class="seat-swatch seat--sweetbox"></span> Sweetbox</div>
        <div class="seat-legend__item"><span class="seat-swatch seat--selected"></span> Đang chọn</div>
        <div class="seat-legend__item"><span class="seat-swatch seat--booked">✕</span> Đã chọn</div>
    </div>

</main>

<!-- ============================================================
     FORM ẨN — mang dữ liệu sang bước Combo qua query param.
     ============================================================ -->
<form id="seatForm" method="get" th:action="@{/booking/combo}">
    <input type="hidden" name="showtimeId" th:value="${showtimeId}"/>
    <input type="hidden" name="seatIds" id="seatIdsInput" value=""/>
    <input type="hidden" name="seatTotal" id="seatTotalInput" value="0"/>
</form>

<!-- ============================================================
     ACTION BAR — sticky dưới cùng (dùng lại đúng pattern của trang Combo).
     ============================================================ -->
<div class="booking-actionbar">

    <!-- Chưa rõ route thật của trang bookingContext nên tạm dùng history.back() -->
    <button type="button" class="btn btn-outline" onclick="history.back()">
        <span class="material-symbols-outlined">arrow_back</span>
        Quay về
    </button>

    <div class="booking-actionbar__summary">
        <div class="detail-group">
            <div class="detail-label">GHẾ ĐÃ CHỌN</div>
            <div class="detail-value" id="selectedSeatsDisplay">
                <span class="text-muted">Vui lòng chọn ghế...</span>
            </div>
        </div>
    </div>

    <div class="booking-actionbar__total">
        <div class="detail-label">TỔNG THANH TOÁN</div>
        <div class="detail-value is-code" id="grandTotal">0 đ</div>
    </div>

    <button type="submit" form="seatForm" class="btn btn-primary btn-lg" id="continueBtn" disabled>
        Tiếp tục
        <span class="material-symbols-outlined">arrow_forward</span>
    </button>
</div>

<script th:inline="javascript">
    /*
     * Logic demo phía client: chọn/bỏ chọn ghế, tính tổng tiền theo loại ghế
     * (seatPrices truyền từ server), đồng bộ vào input ẩn để submit qua
     * query param sang trang Combo.
     */
    const seatPrices = /*[[${seatPriceJson}]]*/ {};
    const selectedSeats = new Set();

    function formatVnd(amount) {
        return Math.round(amount).toLocaleString('vi-VN') + ' đ';
    }

    function recalc() {
        let total = 0;
        selectedSeats.forEach(code => {
            const btn = document.querySelector('[data-seat-code="' + code + '"]');
            total += Number(seatPrices[btn.dataset.seatType]);
        });

        document.getElementById('seatIdsInput').value = Array.from(selectedSeats).join(',');
        document.getElementById('seatTotalInput').value = total;
        document.getElementById('grandTotal').textContent = formatVnd(total);

        document.getElementById('selectedSeatsDisplay').innerHTML = selectedSeats.size
            ? Array.from(selectedSeats).join(', ')
            : '<span class="text-muted">Vui lòng chọn ghế...</span>';

        document.getElementById('continueBtn').disabled = selectedSeats.size === 0;
    }

    document.querySelectorAll('.seat:not(:disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
            const code = btn.dataset.seatCode;
            if (selectedSeats.has(code)) {
                selectedSeats.delete(code);
                btn.classList.remove('seat--selected');
            } else {
                selectedSeats.add(code);
                btn.classList.add('seat--selected');
            }
            recalc();
        });
    });

    recalc();
</script>

</body>
</html>
