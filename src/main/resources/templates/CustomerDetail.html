<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${customer.fullName + ' - Chi tiết khách hàng - CineMax Admin'}">Chi tiết khách hàng - CineMax Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="app-container">


    <div class="app-body">

        <div th:replace="admin/fragments/admin-sidebar :: admin-sidebar(activePage='customers')"></div>

        <main class="main-area">
            <div class="page-content">

                <div class="top-action-bar">
                    <a th:href="@{/admin/customers/dashboard}" class="back-btn">
                        <i class="fa-solid fa-arrow-left"></i> Quay lại danh sách
                    </a>

                </div>

                <div class="profile-main-card">
                    <div class="profile-avatar-wrapper">
                        <div class="customer-large-avatar avatar-letter" th:text="${customer.fullName != null ? #strings.substring(customer.fullName, 0, 1) : '?'}">?</div>
                    </div>
                    <div class="profile-info-wrapper">
                        <div class="name-badge-row">
                            <h2 class="customer-name" th:text="${customer.fullName}"></h2>
                        </div>
                        <div class="member-id" th:text="'Mã thành viên: CMX-' + ${customer.customerId}"></div>

                        <div class="meta-info-grid">
                            <div class="meta-item">
                                <span class="meta-lbl">LẦN ĐẶT GẦN NHẤT</span>
                                <span class="meta-val" th:text="${customer.latestBooking != null ? #temporals.format(customer.latestBooking, 'dd MMM, yyyy') : 'Chưa có'}"></span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-lbl">TRẠNG THÁI</span>
                                <span class="meta-val" th:classappend="${customer.status == 'ACTIVE' ? 'status-active-text' : ''}">
                                    <span class="dot-indicator" th:style="${customer.status != 'ACTIVE' ? 'background:#666' : ''}"></span>
                                    <span th:text="${customer.status == 'ACTIVE' ? 'Đang hoạt động' : 'Bị khóa'}"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="metrics-grid-2">
                    <div class="metric-card">
                        <div class="metric-header">
                            <i class="fa-solid fa-wallet"></i>
                            <span class="metric-title">TỔNG CHI TIÊU</span>
                        </div>
                        <div class="metric-value" th:text="${#numbers.formatInteger(customer.totalSpent != null ? customer.totalSpent : 0, 1, 'DEFAULT')} + ' VND'"></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-header">
                            <i class="fa-solid fa-ticket"></i>
                            <span class="metric-title">VÉ ĐÃ ĐẶT</span>
                        </div>
                        <div class="metric-value" th:text="${customer.totalBookings}"></div>
                    </div>
                </div>

                <div class="split-details-layout">
                    <div class="info-sidebar-card">
                        <h3 class="box-title">Thông tin cá nhân</h3>

                        <div class="info-group">
                            <label class="info-label">ĐỊA CHỈ EMAIL</label>
                            <div class="info-value" th:text="${customer.email}"></div>
                        </div>

                        <div class="info-group">
                            <label class="info-label">SỐ ĐIỆN THOẠI</label>
                            <div class="info-value" th:text="${customer.phone != null ? customer.phone : '---'}"></div>
                        </div>

                        <div class="info-group">
                            <label class="info-label">NGÀY SINH</label>
                            <div class="info-value" th:text="${customer.birthday != null ? #temporals.format(customer.birthday, 'dd MMM, yyyy') : '---'}"></div>
                        </div>

                        <div class="info-group">
                            <label class="info-label">GIỚI TÍNH</label>
                            <div class="info-value" th:text="${customer.gender != null ? customer.gender : '---'}"></div>
                        </div>
                    </div>

                    <div class="transactions-main-card">
                        <div class="table-title-row">
                            <h3 class="box-title">Giao dịch gần đây</h3>
                            <a href="javascript:void(0)" class="view-all-link">Xem tất cả</a>
                        </div>

                        <table class="transaction-table">
                            <thead>
                            <tr>
                                <th>NGÀY</th>
                                <th>SẢN PHẨM / PHIM</th>
                                <th>RẠP</th>
                                <th>SỐ TIỀN</th>
                                <th>TRẠNG THÁI</th>
                            </tr>
                            </thead>
                            <tbody id="transactionBody">
                            <tr th:each="tx : ${transactions}" class="tx-row">
                                <td class="muted-td" th:text="${tx.date}"></td>
                                <td>
                                    <div class="product-title" th:text="${tx.productName}"></div>
                                    <div class="product-sub" th:text="${tx.productDetails}"></div>
                                </td>
                                <td class="muted-td" th:text="${tx.theater}"></td>
                                <td class="price-td" th:text="${#numbers.formatInteger(tx.amount != null ? tx.amount : 0, 1, 'DEFAULT')} + ' đ'"></td>
                                <td>
                                    <span th:class="${tx.status == 'Hoàn thành' ? 'status-pill success' : 'status-pill canceled'}" th:text="${tx.status}"></span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(transactions)}">
                                <td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted);">Không có giao dịch nào</td>
                            </tr>
                            </tbody>
                        </table>
                        <div class="table-footer" id="txPagination" th:if="${not #lists.isEmpty(transactions)}">
                            <span class="footer-count" id="txPageInfo"></span>
                            <div class="pagination-arrows">
                                <button class="p-btn" id="txPrevPage"><i class="fa-solid fa-chevron-left"></i></button>
                                <button class="p-btn" id="txNextPage"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/CustomerDetail.js}"></script>
</body>
</html>
