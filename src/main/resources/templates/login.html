<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - CineMax</title>

    <!-- ============================================================
         CSS: Bootstrap (grid/reset) + Tailwind (utility, nếu dùng) + style.css (design system riêng)
         Lưu ý: style.css PHẢI load SAU bootstrap để override đúng class trùng tên (.btn, .container, .form-control...)
         ============================================================ -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Icon: dùng Bootstrap Icons cho các icon mail/lock/eye/phone... -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<!-- ============================================================
     NAVBAR - import từ fragment dùng chung cho toàn bộ site
     activePage để trống vì trang login không nằm trong menu chính
     currentUser do Controller set vào model (null nếu chưa đăng nhập)
     ============================================================ -->
<div th:replace="~{fragments/header :: header}"></div>
<!-- ============================================================
     AUTH SECTION - Khung đăng nhập / đăng ký
     ============================================================ -->
<main class="auth-wrapper">
    <div class="auth-card">

        <!-- ---------- Tab chuyển đổi Đăng nhập / Đăng ký ---------- -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</div>
            <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Đăng ký</div>
        </div>

        <!-- ============================================================
             FORM ĐĂNG NHẬP
             th:action trỏ tới endpoint xử lý login phía backend (Spring Security/Controller)
             ============================================================ -->
        <div id="loginForm">
            <h2 class="auth-title">CineMax Welcome</h2>

            <!-- Thông báo lỗi đăng nhập (nếu có)-->
            <div class="alert alert-danger py-2" th:if="${error}">
                <p th:text="${error}"></p>
            </div>

            <form class="auth-form" th:action="@{/login-submit}" method="post" th:object="${user}">
                <!-- Email hoặc Số điện thoại -->
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input
                            type="text"
                            th:field="*{email}"
                            class="form-control"
                            placeholder="Nhập email hoặc số điện thoại"
                            required>
                </div>

                <!-- Mật khẩu (có icon ẩn/hiện) -->
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input
                                type="password"
                                th:field="*{password}"
                                class="form-control"
                                placeholder="Nhập mật khẩu"
                                required>
                        <i class="bi bi-eye input-icon" onclick="togglePassword('password', this)"></i>
                    </div>
                </div>

                <!-- Ghi nhớ đăng nhập + Quên mật khẩu -->
<!--                <div class="auth-extras">-->
<!--                    <label class="form-check">-->
<!--                        <input type="checkbox" class="form-check-input" name="remember-me">-->
<!--                        <span class="form-check-label">Ghi nhớ đăng nhập</span>-->
<!--                    </label>-->
<!--                    <a th:href="@{/quen-mat-khau}" href="#" class="forgot-link">Quên mật khẩu?</a>-->
<!--                </div>-->

                <!-- Nút submit -->
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign In</button>
            </form>

            <div class="divider-text mt-lg mb-lg">
                <span>Hoặc đăng nhập bằng</span>
            </div>

            <a th:href="@{/auth/google/login}" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Đăng nhập với Google
            </a>

            <hr class="divider mt-lg mb-lg">

            <div class="auth-footer">
                Chưa có tài khoản?
                <a href="javascript:void(0)" onclick="switchTab('register')">Đăng ký ngay</a>
            </div>
        </div>

        <!-- ============================================================
             FORM ĐĂNG KÝ (ẩn mặc định, hiện khi click tab "Đăng ký")
             ============================================================ -->
        <div id="registerForm" class="d-none">
            <h2 class="auth-title">Tạo tài khoản CineMax mới</h2>

            <form class="auth-form" th:action="@{/dang-ky}" method="post" th:object="${registerForm}">
                <!-- Họ tên -->
                <div class="form-group">
                    <label class="form-label" for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" class="form-control"
                           placeholder="Nhập họ và tên" required>
                </div>

                <!-- Email hoặc SĐT -->
                <div class="form-group">
                    <label class="form-label" for="registerUsername">Email hoặc Số điện thoại</label>
                    <input type="text" id="registerUsername" name="username" class="form-control"
                           placeholder="Nhập email hoặc số điện thoại" required>
                </div>

                <!-- Mật khẩu -->
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="registerPassword" name="password" class="form-control"
                               placeholder="Nhập mật khẩu" required>
                        <i class="bi bi-eye input-icon" onclick="togglePassword('registerPassword', this)"></i>
                    </div>
                </div>

                <!-- Xác nhận mật khẩu -->
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                               placeholder="Nhập lại mật khẩu" required>
                        <i class="bi bi-eye input-icon" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                </div>

                <!-- Đồng ý điều khoản -->
                <label class="form-check">
                    <input type="checkbox" class="form-check-input" name="agreeTerms" required>
                    <span class="form-check-label">
                        Tôi đồng ý với <a th:href="@{/dieu-khoan}" href="#" class="text-accent">Điều khoản sử dụng</a>
                    </span>
                </label>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Đăng ký</button>
            </form>

            <hr class="divider mt-lg mb-lg">

            <div class="auth-footer">
                Đã có tài khoản?
                <a href="javascript:void(0)" onclick="switchTab('login')">Đăng nhập ngay</a>
            </div>
        </div>

    </div>
</main>

<!-- ============================================================
     FOOTER - import từ fragment dùng chung cho toàn bộ site
     ============================================================ -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- ============================================================
     JS: Bootstrap bundle (nếu cần dropdown/modal) + xử lý tab & ẩn hiện mật khẩu
     ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Chuyển đổi giữa form Đăng nhập / Đăng ký
    function switchTab(tab) {
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        if (tab === 'login') {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('d-none');
            registerForm.classList.add('d-none');
        } else {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('d-none');
            loginForm.classList.add('d-none');
        }
    }

    // Ẩn / hiện mật khẩu khi click icon con mắt
    function togglePassword(inputId, iconEl) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        iconEl.classList.toggle('bi-eye');
        iconEl.classList.toggle('bi-eye-slash');
    }
</script>

</body>
</html>
