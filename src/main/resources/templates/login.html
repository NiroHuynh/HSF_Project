<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - CineMax</title>

    <!-- ============================================================
         CSS: Bootstrap (grid/reset) + Tailwind (utility, nếu dùng) + style.css (design system riêng)
         Lưu ý: style.css PHẢI load SAU bootstrap để override đúng class trùng tên (.btn, .container, .form-control...)
         ============================================================ -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Icon: dùng Bootstrap Icons cho các icon mail/lock/eye/phone... -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<!-- ============================================================
     NAVBAR - import từ fragment dùng chung cho toàn bộ site
     activePage để trống vì trang login không nằm trong menu chính
     currentUser do Controller set vào model (null nếu chưa đăng nhập)
     ============================================================ -->
<div th:replace="~{fragments/header :: header}"></div>
<!-- ============================================================
     AUTH SECTION - Khung đăng nhập / đăng ký
     ============================================================ -->
<main class="auth-wrapper">
    <div class="auth-card">

        <!-- ---------- Tab chuyển đổi Đăng nhập / Đăng ký ---------- -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</div>
            <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Đăng ký</div>
        </div>

        <!-- ============================================================
             FORM ĐĂNG NHẬP
             th:action trỏ tới endpoint xử lý login phía backend (Spring Security/Controller)
             ============================================================ -->
        <div id="loginForm">
            <h2 class="auth-title">CineMax Welcome</h2>

            <!-- Thông báo lỗi đăng nhập (nếu có)-->
            <div class="alert alert-danger py-2" th:if="${error}">
                <p th:text="${error}"></p>
            </div>

            <!-- Thông báo thành công (đăng ký / đặt lại mật khẩu) -->
            <div class="alert alert-success py-2" th:if="${success}">
                <p th:text="${success}"></p>
            </div>

            <form class="auth-form" th:action="@{/login-submit}" method="post" th:object="${user}">
                <!-- Email hoặc Số điện thoại -->
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input
                            type="text"
                            th:field="*{email}"
                            class="form-control"
                            placeholder="Nhập email hoặc số điện thoại"
                            required>
                </div>

                <!-- Mật khẩu (có icon ẩn/hiện) -->
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input
                                type="password"
                                th:field="*{password}"
                                class="form-control"
                                placeholder="Nhập mật khẩu"
                                required>
                        <i class="bi bi-eye input-icon" onclick="togglePassword('password', this)"></i>
                    </div>
                </div>

                <!-- Quên mật khẩu -->
                <div class="auth-extras">
                    <a th:href="@{/forgot-password}" class="forgot-link">Quên mật khẩu?</a>
                </div>

                <!-- Nút submit -->
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign In</button>
            </form>

            <hr class="divider mt-lg mb-lg">

            <div class="auth-footer">
                Chưa có tài khoản?
                <a href="javascript:void(0)" onclick="switchTab('register')">Đăng ký ngay</a>
            </div>
        </div>

        <!-- ============================================================
             FORM ĐĂNG KÝ (ẩn mặc định, hiện khi click tab "Đăng ký")
             ============================================================ -->
        <div id="registerForm" class="d-none">
            <h2 class="auth-title">Tạo tài khoản CineMax mới</h2>

            <form class="auth-form" th:action="@{/register}" method="post" th:object="${registerForm}">
                <!-- Họ + Tên -->
                <div class="row g-2">
                    <div class="col-6 form-group">
                        <label class="form-label" for="lastName">Họ</label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control"
                               placeholder="VD: Nguyễn Văn" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
                    </div>
                    <div class="col-6 form-group">
                        <label class="form-label" for="firstName">Tên</label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control"
                               placeholder="VD: An" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" th:field="*{email}" class="form-control"
                           placeholder="Nhập email" required>
                    <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                </div>

                <!-- Số điện thoại (tuỳ chọn) -->
                <div class="form-group">
                    <label class="form-label" for="registerPhone">Số điện thoại (tuỳ chọn)</label>
                    <input type="text" id="registerPhone" th:field="*{phoneNumber}" class="form-control"
                           placeholder="VD: 0912345678">
                    <small class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></small>
                </div>

                <!-- Mật khẩu -->
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="registerPassword" th:field="*{password}" class="form-control"
                               placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" required>
                        <i class="bi bi-eye input-icon" onclick="togglePassword('registerPassword', this)"></i>
                    </div>
                    <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                </div>

                <!-- Xác nhận mật khẩu -->
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                               placeholder="Nhập lại mật khẩu" required>
                        <i class="bi bi-eye input-icon" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                    <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Đăng ký</button>
            </form>

            <hr class="divider mt-lg mb-lg">

            <div class="auth-footer">
                Đã có tài khoản?
                <a href="javascript:void(0)" onclick="switchTab('login')">Đăng nhập ngay</a>
            </div>
        </div>

    </div>
</main>

<!-- ============================================================
     FOOTER - import từ fragment dùng chung cho toàn bộ site
     ============================================================ -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- ============================================================
     JS: Bootstrap bundle (nếu cần dropdown/modal) + xử lý tab & ẩn hiện mật khẩu
     ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // Chuyển đổi giữa form Đăng nhập / Đăng ký
    function switchTab(tab) {
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        if (tab === 'login') {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.remove('d-none');
            registerForm.classList.add('d-none');
        } else {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.remove('d-none');
            loginForm.classList.add('d-none');
        }
    }

    // Mở sẵn tab Đăng ký khi form đăng ký bị lỗi validation
    /*<![CDATA[*/
    if (/*[[${showRegister != null && showRegister}]]*/ false) {
        switchTab('register');
    }
    /*]]>*/

    // Ẩn / hiện mật khẩu khi click icon con mắt
    function togglePassword(inputId, iconEl) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        iconEl.classList.toggle('bi-eye');
        iconEl.classList.toggle('bi-eye-slash');
    }
</script>

</body>
</html>
