<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ưu Đãi Độc Quyền - CineMax</title>

    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css"/>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"/>

    <style>
        :root {
            --color-brand-red:        #E31B23;
            --color-brand-red-hover:  #C41219;
            --color-brand-red-light:  rgba(227, 27, 35, 0.15);
            --color-bg:               #0A0A0C;
            --color-surface:          #111114;
            --color-surface-raised:   #18181D;
            --color-text-primary:     #FFFFFF;
            --color-text-secondary:   #A0A0B0;
            --color-text-muted:       #606070;
            --color-border-strong:    rgba(255, 255, 255, 0.16);
            --shadow-card:            0 4px 24px rgba(0, 0, 0, 0.45);
            --shadow-card-hover:      0 8px 40px rgba(0, 0, 0, 0.65);
            --radius-md:              12px;
            --radius-sm:              8px;
            --font-family:            'Inter', sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-family);
            margin: 0;
        }

        .booking-page-content {
            padding-block: var(--space-xl);
        }

        .title {
            font-size: var(--text-headline-lg, 28px);
            font-weight: 700;
            margin-bottom: var(--space-lg);
        }
        .copy-toast {
            position: fixed; right: 24px; bottom: 24px; z-index: 10000;
            display: flex; align-items: center; gap: 10px; padding: 14px 18px;
            color: #fff; background: #18181D; border: 1px solid rgba(45, 122, 79, .7);
            border-radius: 10px; box-shadow: 0 12px 36px rgba(0,0,0,.45);
            opacity: 0; transform: translateY(12px); pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
        }
        .copy-toast.is-visible { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body>

<!-- NAVBAR dùng chung toàn site -->
<div th:replace="~{fragments/header :: header}"></div>

<main class="container booking-page-content">
    <h1 class="title">Ưu Đãi Độc Quyền Dành Cho Bạn</h1>

    <div class="grid">
        <div th:each="v : ${vouchers}" class="voucher-card">
            <div>
                <div class="v-badge">
                    <span th:if="${v.discountType == 'PERCENT'}" th:text="'GIẢM ' + ${#numbers.formatDecimal(v.discountValue, 0, 0)} + '%'"></span>
                    <span th:if="${v.discountType == 'FIXED'}" th:text="'GIẢM ' + ${#numbers.formatDecimal(v.discountValue, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                </div>

                <h3 class="v-name" th:text="${v.name}">Tên Chương Trình</h3>
                <p class="v-desc" th:text="${v.description}">Mô tả chi tiết voucher...</p>
            </div>

            <div>
                <div class="v-meta">
                    <span class="material-symbols-outlined" style="font-size:14px;">vpn_key</span>
                    <span>Code: <strong th:text="${v.code}" style="color: var(--color-text-primary);">CODE123</strong></span>
                </div>
                <div class="v-meta">
                    <span class="material-symbols-outlined" style="font-size:14px;">calendar_month</span>
                    <span th:text="'HSD: ' + ${#temporals.format(v.endDate, 'dd/MM/yyyy')}">HSD</span>
                </div>

                <div class="v-meta" th:if="${v.usageLimit != null}">
                    <span class="material-symbols-outlined" style="font-size:14px;">hourglass_empty</span>
                    <span th:text="'Còn lại: ' + ${(v.usageLimit - v.usedCount)} + ' lượt sử dụng'">Lượt</span>
                </div>

                <!-- Thymeleaf không cho nối chuỗi biến trong th:onclick (chống XSS)
                     → đưa mã vào data-code rồi đọc lại trong handler -->
                <button th:data-code="${v.code}"
                        onclick="copyVoucherCode(this)"
                        class="btn-copy">
                    Sao chép mã
                </button>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(vouchers)}" style="text-align: center; color: var(--color-text-muted); padding-block: var(--space-2xl);">
        <span class="material-symbols-outlined" style="font-size: 48px; margin-bottom: var(--space-xs);">sentiment_dissatisfied</span>
        <div class="body-md">Hiện tại chưa có mã ưu đãi mới nào khả dụng. Hãy quay lại sau nhé!</div>
    </div>
</main>

<!-- FOOTER dùng chung toàn site -->
<div th:replace="~{fragments/footer :: footer}"></div>
<div id="copyToast" class="copy-toast" role="status" aria-live="polite">
    <span class="material-symbols-outlined" style="color:#4CAF78">check_circle</span>
    <span id="copyToastText">Đã sao chép mã ưu đãi</span>
</div>
<script th:replace="~{fragments/header :: header-script}"></script>
<script>
    let copyToastTimer;
    async function copyVoucherCode(button) {
        const code = button.dataset.code;
        try {
            await navigator.clipboard.writeText(code);
        } catch (_) {
            const input = document.createElement('textarea');
            input.value = code;
            input.style.position = 'fixed';
            input.style.opacity = '0';
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            input.remove();
        }
        const toast = document.getElementById('copyToast');
        document.getElementById('copyToastText').textContent = 'Đã sao chép mã ưu đãi: ' + code;
        toast.classList.add('is-visible');
        clearTimeout(copyToastTimer);
        copyToastTimer = setTimeout(() => toast.classList.remove('is-visible'), 2600);
    }
</script>

</body>
</html>
