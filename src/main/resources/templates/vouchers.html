<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kho Voucher - CineMax</title>
    <style>
        :root {
            /* --- Brand Colors --- */
            --color-brand-red:        #E31B23;
            --color-brand-red-hover:  #C41219;
            --color-brand-red-light:  rgba(227, 27, 35, 0.15);

            /* --- Surface / Background --- */
            --color-bg:               #0A0A0C;
            --color-surface:          #111114;
            --color-surface-raised:   #18181D;

            /* --- Text --- */
            --color-text-primary:     #FFFFFF;
            --color-text-secondary:   #A0A0B0;
            --color-text-muted:       #606070;

            /* --- Borders & Shadows --- */
            --color-border-strong:    rgba(255, 255, 255, 0.16);
            --shadow-card:            0 4px 24px rgba(0, 0, 0, 0.45);
            --radius-md:              12px;
            --radius-sm:              8px;
            --font-family:            'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-family);
            padding: 32px 16px;
            margin: 0;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Giao diện chuẩn phong cách Ticket rạp phim */
        .voucher-card {
            background-color: var(--color-surface);
            border: 1px dashed var(--color-border-strong);
            border-radius: var(--radius-md);
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--shadow-card);
            transition: 250ms ease;
        }
        .voucher-card:hover {
            background-color: var(--color-surface-raised);
            transform: translateY(-2px);
        }

        /* Vết khoét vé 2 bên hông */
        .voucher-card::before, .voucher-card::after {
            content: ''; position: absolute; top: 50%; width: 16px; height: 16px;
            background-color: var(--color-bg); border-radius: 50%; transform: translateY(-50%);
        }
        .voucher-card::before { left: -9px; border-right: 1px dashed var(--color-border-strong); }
        .voucher-card::after { right: -9px; border-left: 1px dashed var(--color-border-strong); }

        .v-badge {
            background-color: var(--color-brand-red-light);
            color: var(--color-brand-red);
            padding: 4px 8px; border-radius: 4px;
            font-size: 12px; font-weight: 700; display: inline-block;
        }
        .v-name { font-size: 18px; font-weight: 700; margin: 12px 0 6px 0; }
        .v-desc { color: var(--color-text-secondary); font-size: 14px; margin: 0 0 16px 0; line-height: 1.5; }

        .v-meta { color: var(--color-text-muted); font-size: 12px; margin-bottom: 4px; }

        .btn-copy {
            background-color: var(--color-brand-red);
            color: white; border: none; padding: 10px;
            border-radius: var(--radius-sm); font-weight: 600;
            cursor: pointer; transition: 150ms ease; text-align: center;
            width: 100%; margin-top: 12px;
        }
        .btn-copy:hover { background-color: var(--color-brand-red-hover); }
    </style>
</head>
<body>
<div class="container">
    <h1 class="page-title">Ưu Đãi Của Bạn</h1>

    <div class="grid">
        <div th:each="v : ${vouchers}" class="voucher-card">
            <div>
                <div class="v-badge">
                    <span th:if="${v.discountType == 'PERCENTAGE'}" th:text="'GIẢM ' + ${#numbers.formatDecimal(v.discountValue, 0, 0)} + '%'"></span>
                    <span th:if="${v.discountType == 'FIXED'}" th:text="'GIẢM ' + ${#numbers.formatDecimal(v.discountValue, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                </div>

                <h3 class="v-name" th:text="${v.name}">Tên Chương Trình</h3>
                <p class="v-desc" th:text="${v.description}">Mô tả chi tiết áp dụng...</p>
            </div>

            <div>
                <div class="v-meta">
                    Code: <strong th:text="${v.code}" style="color: var(--color-text-primary);">CODE123</strong>
                </div>
                <div class="v-meta" th:text="'HSD: ' + ${#temporals.format(v.endDate, 'dd/MM/yyyy')}">HSD: 31/12/2026</div>

                <div class="v-meta" th:if="${v.usageLimit != null}"
                     th:text="'Còn lại: ' + ${(v.usageLimit - v.usedCount)} + ' lượt dùng'"></div>

                <button th:onclick="'navigator.clipboard.writeText(\'' + ${v.code} + '\'); alert(\'Đã sao chép mã: ' + ${v.code} + '\');'"
                        class="btn-copy">
                    Sao chép mã
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
