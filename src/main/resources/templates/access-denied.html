<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có quyền truy cập - CineMax</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-wrapper">
    <div class="auth-card" style="text-align:center;">
        <i class="bi bi-shield-lock" style="font-size:64px; color:var(--color-brand-red, #E31B23);"></i>
        <h2 class="auth-title mt-3">403 - Không có quyền truy cập</h2>
        <p class="text-secondary mb-4">
            Tài khoản của bạn không được phép truy cập trang này.
        </p>
        <a th:href="@{/home}" class="btn btn-primary btn-lg">Về trang chủ</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
