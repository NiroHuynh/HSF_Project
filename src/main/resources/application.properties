spring.application.name=HSF_Project
server.port=8080

# UTF-8 cho request/response (xem thêm CharacterEncodingFilter trong WebConfig)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Buộc trình duyệt revalidate CSS/JS/ảnh mỗi lần (tránh dính cache cũ khi dev sửa style.css)
spring.web.resources.cache.cachecontrol.no-cache=true

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HSF_PROJECT;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Ép Spring phải chạy file data.sql SAU KHI Hibernate đã tạo bảng xong
#spring.jpa.defer-datasource-initialization=true
#
## Đảm bảo tính năng khởi tạo data từ file .sql luôn được bật
